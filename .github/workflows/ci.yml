name: VORTEX OS CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-none
          components: rustfmt, clippy
      - name: Cargo Check
        run: cargo check --workspace
      - name: Build Kernel
        run: cargo build -p vortex-kernel --target aarch64-unknown-none
